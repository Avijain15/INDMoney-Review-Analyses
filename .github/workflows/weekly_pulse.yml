name: Weekly INDMoney Insights Pulse

on:
  # Every Thursday at 3:00 PM IST = 09:30 AM UTC
  schedule:
    - cron: "30 9 * * 4"

  # Allows triggering this workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  generate_and_dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: phase6/requirements.txt

      - name: Install dependencies
        run: pip install -r phase6/requirements.txt

      - name: Run pipeline
        env:
          # All secrets are stored in GitHub Repository Secrets
          # Settings → Secrets and Variables → Actions → New Repository Secret
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD:   ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL:    ${{ secrets.RECEIVER_EMAIL }}
          REVIEW_COUNT:      "1000"
        run: python phase6/main.py
